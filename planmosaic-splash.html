<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanMosaic - 启动</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #F9F8F6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Outfit", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 装饰性背景网格 */
        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(138, 125, 114, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(138, 125, 114, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridFloat 20s linear infinite;
        }

        @keyframes gridFloat {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* 柔和光晕 */
        .glow-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(93, 174, 75, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            top: 10%;
            right: 10%;
            animation: glowPulse 6s ease-in-out infinite;
        }

        .glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(138, 125, 114, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            bottom: 15%;
            left: 10%;
            animation: glowPulse 8s ease-in-out infinite reverse;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        /* 主容器 */
        .splash-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        /* Logo 区域 */
        .logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* Mosaic 风格图标 */
        .mosaic-icon {
            width: 100px;
            height: 100px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        .mosaic-tile {
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .tile-1 { background: #2A2927; animation: tilePulse 2s ease-in-out infinite; }
        .tile-2 { background: #5DAE4B; animation: tilePulse 2s ease-in-out infinite 0.2s; }
        .tile-3 { background: #8A7D72; animation: tilePulse 2s ease-in-out infinite 0.4s; }
        .tile-4 { background: #5DAE4B; animation: tilePulse 2s ease-in-out infinite 0.1s; }
        .tile-5 { background: #2A2927; animation: tilePulse 2s ease-in-out infinite 0.3s; }
        .tile-6 { background: #B8943D; animation: tilePulse 2s ease-in-out infinite 0.5s; }
        .tile-7 { background: #8A7D72; animation: tilePulse 2s ease-in-out infinite 0.15s; }
        .tile-8 { background: #6B82A5; animation: tilePulse 2s ease-in-out infinite 0.35s; }
        .tile-9 { background: #2A2927; animation: tilePulse 2s ease-in-out infinite 0.45s; }

        @keyframes tilePulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.92); opacity: 0.8; }
        }

        /* 品牌名称 */
        .brand-name {
            font-size: 36px;
            font-weight: 500;
            color: #1A1918;
            letter-spacing: -0.5px;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .brand-plan {
            font-weight: 400;
            color: #3E3C38;
        }

        .brand-mosaic {
            font-weight: 600;
            color: #1A1918;
        }

        .brand-tagline {
            font-size: 13px;
            color: #8A8780;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* 加载动画 */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .loader {
            display: flex;
            gap: 6px;
        }

        .loader-bar {
            width: 4px;
            height: 24px;
            background: #E8E6E0;
            border-radius: 2px;
            animation: barWave 1.2s ease-in-out infinite;
        }

        .loader-bar:nth-child(1) { animation-delay: 0s; background: #5DAE4B; }
        .loader-bar:nth-child(2) { animation-delay: 0.1s; }
        .loader-bar:nth-child(3) { animation-delay: 0.2s; }
        .loader-bar:nth-child(4) { animation-delay: 0.3s; background: #5DAE4B; }
        .loader-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes barWave {
            0%, 100% { transform: scaleY(1); opacity: 0.3; }
            50% { transform: scaleY(1.6); opacity: 1; }
        }

        .loading-text {
            font-size: 14px;
            color: #8A8780;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* 版本号 */
        .version {
            position: absolute;
            bottom: 60px;
            font-size: 12px;
            color: #D0CEC7;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* 版权信息 */
        .copyright {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            color: #D0CEC7;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="splash-container">
        <div class="logo-wrapper">
            <div class="mosaic-icon">
                <div class="mosaic-tile tile-1"></div>
                <div class="mosaic-tile tile-2"></div>
                <div class="mosaic-tile tile-3"></div>
                <div class="mosaic-tile tile-4"></div>
                <div class="mosaic-tile tile-5"></div>
                <div class="mosaic-tile tile-6"></div>
                <div class="mosaic-tile tile-7"></div>
                <div class="mosaic-tile tile-8"></div>
                <div class="mosaic-tile tile-9"></div>
            </div>
            <div class="brand-name">
                <span class="brand-plan">Plan</span><span class="brand-mosaic">Mosaic</span>
            </div>
            <div class="brand-tagline">智能日程 · 高效规划</div>
        </div>

        <div class="loader-container">
            <div class="loader">
                <div class="loader-bar"></div>
                <div class="loader-bar"></div>
                <div class="loader-bar"></div>
                <div class="loader-bar"></div>
                <div class="loader-bar"></div>
            </div>
            <div class="loading-text">正在启动...</div>
        </div>
    </div>

    <div class="version">v1.0.0</div>
    <div class="copyright">© 2026 PlanMosaic Team</div>
</body>
</html>
