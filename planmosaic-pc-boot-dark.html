<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanMosaic - 启动</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@300;400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #1A1816;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Albert Sans', sans-serif;
        }

        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1A1816;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-logo {
            font-size: 52px;
            font-weight: 300;
            letter-spacing: 6px;
            font-family: 'Fraunces', serif;
            background: linear-gradient(135deg, #9A90A9, #7D7590, #B8A8A0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(10px);
            animation: logoFadeIn 1.2s ease forwards;
            animation-delay: 0.3s;
        }

        @keyframes logoFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-line {
            width: 0;
            height: 1px;
            background: #7D7590;
            margin-top: 30px;
            animation: lineExpand 0.8s ease forwards;
            animation-delay: 1s;
        }

        @keyframes lineExpand {
            to {
                width: 80px;
            }
        }

        .loading-tagline {
            font-size: 16px;
            font-family: 'Albert Sans', sans-serif;
            font-weight: 300;
            color: #9C9A95;
            margin-top: 24px;
            letter-spacing: 6px;
            opacity: 0;
            animation: taglineFadeIn 0.8s ease forwards;
            animation-delay: 1.5s;
        }

        @keyframes taglineFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loading-logo">PlanMosaic</div>
        <div class="loading-line"></div>
        <div class="loading-tagline">by mosaïque</div>
    </div>
</body>
</html>
